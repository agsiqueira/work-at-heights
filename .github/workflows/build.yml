name: Build and Release Installers

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows

          - os: macos-15-intel
            platform: mac-intel
            mac_arch: x64

          - os: macos-latest
            platform: mac-arm
            mac_arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows distributable
        if: matrix.platform == 'windows'
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Build Mac distributable
        if: startsWith(matrix.platform, 'mac')
        run: npx electron-builder --mac dmg --${{ matrix.mac_arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/latest*.yml
            dist/mac*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}